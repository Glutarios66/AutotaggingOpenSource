# docker-compose.yml
services:
  redis_broker:
    container_name: redis_broker
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  postgres_db:
    container_name: postgres_db
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shared_agent_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # This automatically runs our schema file on database creation.
      - ./db_schemas/agent_memory_schema.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d shared_agent_db"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  agent_service:
    container_name: agent_service
    build: .
    tty: true
    command: python -m core.simulation_runner
    environment:
      # Database and Redis connection details
      DB_HOST: postgres_db
      DB_NAME: shared_agent_db
      DB_USER: user
      DB_PASSWORD: password
      REDIS_HOST: redis_broker

      # Agent and simulation configuration
      # UPDATED LINE: The path is now built dynamically using the AGENT_CONFIG_NAME variable.
      AGENT_CONFIG_DIR_PATH: /app/agent_configs/${AGENT_CONFIG_NAME:-3agent_default}
      PYTHONUNBUFFERED: '1'
      GEMINI_API_KEY: ${GEMINI_API_KEY} # Pass API key from a .env file on the host
      LLM_PROMPT_LOG_FILE: /app/logs/llm_prompts.jsonl

    volumes:
      # Mount all necessary code and configuration
      - ./agent_configs:/app/agent_configs:ro
      - ./agent_common:/app/agent_common:ro
      - ./core/config.py:/app/core/config.py:ro
      - ./core/simulation_runner.py:/app/core/simulation_runner.py:ro
      - ./core/final_evaluation_generator.py:/app/core/final_evaluation_generator.py:ro
      - ./core/logging_config.py:/app/core/logging_config.py:ro
      - ./agent_logs:/app/logs # Mount log directory for output

    depends_on:
      postgres_db:
        condition: service_healthy
      redis_broker:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data: {}