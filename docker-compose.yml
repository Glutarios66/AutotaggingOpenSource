# docker-compose.yml
services:
  redis_broker:
    container_name: redis_broker
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  postgres_db:
    container_name: postgres_db
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shared_agent_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # This automatically runs our schema file on database creation.
      - ./db_schemas/agent_memory_schema.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d shared_agent_db"]
      interval: 10s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: {}